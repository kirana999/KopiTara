version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kopitara_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_rahasia
      POSTGRES_DB: kopitara_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: